name: Run Tests

on:
  push:
  pull_request:
  schedule:
    - cron: '0 0 * * *'

env:
  API_KEY_FIRI: ${{ secrets.API_KEY_FIRI }}

jobs:
  tests:
    name: Test (Python 3.13)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (ty)
        run: uv run ty check

      - name: Run tests with coverage
        run: uv run pytest --cov=firipy --cov-report=xml --cov-report=term-missing

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml

  build-validation:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.14

      - name: Build
        run: uv build

      - name: Verify wheel contents
        run: uv run python -m zipfile -l dist/*.whl
