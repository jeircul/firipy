version: '3'

vars:
  PACKAGE: firipy

silent: false

tasks:
  install:
    desc: Install project with dev dependencies via uv
    cmds:
      - uv sync

  lint:
    desc: Run ruff lint checks
    cmds:
      - uv run ruff check .

  format:
    desc: Run ruff formatter
    cmds:
      - uv run ruff format .

  typecheck:
    desc: Run ty static type checking
    cmds:
      - uv run ty check

  test:
    desc: Run test suite
    cmds:
      - uv run pytest -q

  qa:
    desc: Run lint, typecheck, and unit tests
    cmds:
      - task: lint
      - task: typecheck
      - task: test

  live-test:
    desc: Run live integration tests (requires API_KEY_FIRI and LIVE_FIRI_TESTS=1)
    cmds:
      - 'test -n "${API_KEY_FIRI}" || (echo "API_KEY_FIRI not set" && exit 1)'
      - 'test "${LIVE_FIRI_TESTS}" = "1" || (echo "Set LIVE_FIRI_TESTS=1 to enable live tests" && exit 1)'
      - uv run pytest -q tests/test_live_firi.py

  balance:
    desc: Fetch balances from the live API (requires API_KEY_FIRI)
    cmds:
      - 'test -n "${API_KEY_FIRI}" || (echo "API_KEY_FIRI not set" && exit 1)'
      - uv run python scripts/check_balance.py

  build:
    desc: Build sdist and wheel
    cmds:
      - rm -rf dist
      - uv build

  release-check:
    desc: Run release validation (lint, typecheck, unit tests, build)
    cmds:
      - task: qa
      - task: build

  version:
    desc: Bump semantic version and roll CHANGELOG (PART=patch|minor|major or NEW=x.y.z)
    cmds:
      - |
        PART="{{default "patch" .PART}}"
        DRY_FLAG=""
        if [ "{{.DRY_RUN}}" = "1" ]; then DRY_FLAG="--dry-run"; fi
        if [ -n "{{.NEW}}" ]; then
          uv run python scripts/bump_version.py --new-version "{{.NEW}}" ${DRY_FLAG}
        else
          uv run python scripts/bump_version.py --part "${PART}" ${DRY_FLAG}
        fi
